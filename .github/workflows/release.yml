name: Release

# Triggers a release build when you push a semver tag (e.g. `git tag v1.0.0 && git push --tags`)
# or when manually dispatched from the Actions tab.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true

permissions:
  contents: write    # Needed to create the GitHub Release

jobs:
  build-windows:
    name: Build (windows-latest)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Tests
        run: cargo test --release

      - name: Build TUI
        run: cargo build --release -p dofek --bin dofek-tui

      # Tauri's externalBin expects the binary name suffixed with the target triple.
      # Mirrors the local build-all.ps1 step.
      - name: Stage TUI binary for Tauri externalBin
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String "^host:").ToString().Split(" ")[1]
          Write-Host "Target: $triple"
          Copy-Item "target/release/dofek-tui.exe" "target/release/dofek-tui-$triple.exe" -Force

      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build GUI (Tauri)
        working-directory: gui
        run: cargo tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          if (Test-Path target/release/dofek-tui.exe) {
            Copy-Item target/release/dofek-tui.exe artifacts/
          } else {
            Write-Warning "TUI binary not found at target/release/dofek-tui.exe"
          }

          $bundleRoot = "target/release/bundle"
          if (Test-Path $bundleRoot) {
            Get-ChildItem $bundleRoot -Recurse -Include *.msi,*.exe `
              | Copy-Item -Destination artifacts/ -Force
          } else {
            Write-Warning "No Tauri bundle output found under $bundleRoot."
          }

          Write-Host "`nArtifacts:"
          Get-ChildItem artifacts | Format-Table Name, Length

      - name: Generate SHA256 checksums
        shell: pwsh
        working-directory: artifacts
        run: |
          # Snapshot the file list before opening the output file. The previous
          # streamed pipeline raced with Out-File: Get-ChildItem is lazy, so it
          # re-enumerated SHA256SUMS.txt while it was still locked for writing.
          $files = Get-ChildItem -File -Exclude SHA256SUMS.txt |
                   Select-Object -ExpandProperty Name
          $lines = foreach ($f in $files) {
            $hash = (Get-FileHash $f -Algorithm SHA256).Hash
            "$hash  $f"
          }
          $lines | Out-File -Encoding ascii SHA256SUMS.txt

          Write-Host "`nSHA256SUMS.txt:"
          Get-Content SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: artifacts/*
          retention-days: 14

  build-linux:
    name: Build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            rpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Tests
        run: cargo test --release

      - name: Build TUI
        run: cargo build --release -p dofek --bin dofek-tui

      # Tauri externalBin expects the binary name suffixed with the host target triple.
      - name: Stage TUI binary for Tauri externalBin
        run: |
          triple=$(rustc -vV | sed -n 's/^host: //p')
          echo "Target: $triple"
          cp "target/release/dofek-tui" "target/release/dofek-tui-${triple}"

      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Build GUI (Tauri)
        working-directory: gui
        run: cargo tauri build

      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          if [ -f target/release/dofek-tui ]; then
            cp target/release/dofek-tui artifacts/
          else
            echo "::warning::TUI binary not found at target/release/dofek-tui"
          fi

          bundle_root="target/release/bundle"
          if [ -d "$bundle_root" ]; then
            find "$bundle_root" -type f \
              \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
              -exec cp {} artifacts/ \;
          else
            echo "::warning::No Tauri bundle output found under $bundle_root"
          fi

          echo
          echo "Artifacts:"
          ls -lh artifacts/

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          # Hash every regular file in the directory; write to SHA256SUMS.txt
          : > SHA256SUMS.txt
          for f in *; do
            [ -f "$f" ] && [ "$f" != "SHA256SUMS.txt" ] && sha256sum "$f" >> SHA256SUMS.txt
          done

          echo
          echo "SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: artifacts/*
          retention-days: 14

  build-macos:
    name: Build (macos-latest, aarch64)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Tests
        run: cargo test --release

      - name: Build TUI
        run: cargo build --release -p dofek --bin dofek-tui

      # Tauri externalBin expects the binary name suffixed with the host target triple.
      - name: Stage TUI binary for Tauri externalBin
        run: |
          triple=$(rustc -vV | sed -n 's/^host: //p')
          echo "Target: $triple"
          cp "target/release/dofek-tui" "target/release/dofek-tui-${triple}"

      - name: Install tauri-cli
        run: cargo install tauri-cli --version '^2.0' --locked

      # Ship both bundles: .dmg gives the canonical drag-to-Applications install
      # flow most macOS users expect; .app.zip is the lighter download for users
      # who already know the right-click → Open dance for unsigned apps. Both
      # need the same Gatekeeper override, so this is a UX choice, not security.
      - name: Build GUI (Tauri, .app + .dmg)
        working-directory: gui
        run: cargo tauri build --bundles app dmg

      - name: Collect artifacts
        run: |
          mkdir -p artifacts

          # macOS TUI is renamed with the target triple to disambiguate from the
          # Linux dofek-tui in the publish job's flatten step. Mirrors the .app
          # naming below.
          if [ -f target/release/dofek-tui ]; then
            cp target/release/dofek-tui artifacts/dofek-tui-aarch64-apple-darwin
          else
            echo "::warning::TUI binary not found at target/release/dofek-tui"
          fi

          # The .app bundle is a directory — zip it for upload/distribution.
          app_path=$(find target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n1)
          if [ -n "$app_path" ]; then
            ( cd "$(dirname "$app_path")" && \
              zip -ry "$GITHUB_WORKSPACE/artifacts/dofek-gui-aarch64-apple-darwin.app.zip" "$(basename "$app_path")" )
          else
            echo "::warning::No .app bundle found under target/release/bundle/macos"
          fi

          # The .dmg ships under target/release/bundle/dmg with Tauri's default
          # name (e.g. dofek_1.3.0_aarch64.dmg). Copy as-is — the version+arch
          # already disambiguate from any other platform's artifacts.
          dmg_path=$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f 2>/dev/null | head -n1)
          if [ -n "$dmg_path" ]; then
            cp "$dmg_path" "artifacts/"
          else
            echo "::warning::No .dmg bundle found under target/release/bundle/dmg"
          fi

          echo
          echo "Artifacts:"
          ls -lh artifacts/

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: |
          : > SHA256SUMS.txt
          for f in *; do
            [ -f "$f" ] && [ "$f" != "SHA256SUMS.txt" ] && shasum -a 256 "$f" >> SHA256SUMS.txt
          done

          echo
          echo "SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-build
          path: artifacts/*
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for release notes generation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Each build job uploads its own SHA256SUMS.txt. Download into separate
      # directories so the second download doesn't overwrite the first; then
      # combine into a single canonical SHA256SUMS.txt for the release.
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts-win

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts-linux

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts-macos

      - name: Stage artifacts and combine checksums
        run: |
          mkdir -p artifacts
          # Copy every artifact except the per-platform SHA256SUMS.txt files.
          find artifacts-win artifacts-linux artifacts-macos -mindepth 1 -maxdepth 1 -type f \
            ! -name 'SHA256SUMS.txt' -exec cp -t artifacts/ {} +
          # Combine the per-platform manifests into one.
          cat artifacts-win/SHA256SUMS.txt \
              artifacts-linux/SHA256SUMS.txt \
              artifacts-macos/SHA256SUMS.txt \
            > artifacts/SHA256SUMS.txt
          echo "Combined SHA256SUMS.txt:"
          cat artifacts/SHA256SUMS.txt
          echo
          echo "Final artifacts/:"
          ls -lh artifacts/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect prerelease
        id: prerelease
        shell: bash
        run: |
          if [[ "${{ steps.tag.outputs.value }}" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: dofek ${{ steps.tag.outputs.value }}
          # Auto-publish, do not regress to draft. The original draft:true was
          # there so we could review artifacts before going public — useful when
          # the pipeline was new, painful now that every retag silently un-
          # publishes the live release. The trigger is already restricted to
          # tag pushes (`v*.*.*`), so accidental publishes are unlikely.
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Downloads

            ### Windows (x64)
            | Artifact | Description |
            | --- | --- |
            | `dofek_*.msi` | Desktop GUI installer — bundles both TUI and GUI |
            | `dofek-tui.exe` | Standalone TUI binary |

            ### Linux (x86_64)
            | Artifact | Description |
            | --- | --- |
            | `dofek_*.deb` | Debian / Ubuntu package — bundles both TUI and GUI |
            | `dofek_*.rpm` | Fedora / RHEL / openSUSE package |
            | `dofek_*.AppImage` | Universal portable binary (chmod +x and run) |
            | `dofek-tui` | Standalone TUI binary |

            ### macOS (Apple Silicon — aarch64)
            | Artifact | Description |
            | --- | --- |
            | `dofek_*_aarch64.dmg` | Disk image — open and drag to Applications (recommended) |
            | `dofek-gui-aarch64-apple-darwin.app.zip` | Lighter download — unzip and move the `.app` yourself |
            | `dofek-tui-aarch64-apple-darwin` | Standalone TUI binary (`chmod +x` and run) |

            Intel Macs are not supported in this release.

            ### Verification
            `SHA256SUMS.txt` contains checksums for every artifact above.

            Windows:
            ```powershell
            Get-FileHash .\dofek_1.0.0_x64_en-US.msi -Algorithm SHA256
            ```
            Linux:
            ```sh
            sha256sum -c SHA256SUMS.txt
            ```
            macOS:
            ```sh
            shasum -a 256 -c SHA256SUMS.txt
            ```

            > ⚠️ Binaries are currently unsigned. On Windows, SmartScreen may show a warning on first run (right-click installer → Properties → "Unblock"). On Linux, AppImages need `chmod +x` before running. On macOS, Gatekeeper will block first launch — right-click the .app → **Open** → **Open**, or run `xattr -dr com.apple.quarantine /Applications/dofek.app`.

            ## Changelog

            Auto-generated below.
